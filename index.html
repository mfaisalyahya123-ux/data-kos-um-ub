<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Kos UM/UB - Keuangan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2em;
      opacity: 0.9;
    }
    
    /* Toggle Switch */
    .toggle-container {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    
    .toggle-switch {
      background: white;
      border-radius: 50px;
      padding: 5px;
      display: flex;
      gap: 5px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .toggle-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 50px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      background: transparent;
      color: #666;
    }
    
    .toggle-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .toggle-btn:hover:not(.active) {
      background: #f0f0f0;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
    }
    
    .stat-label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 10px;
    }
    
    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }
    
    .section {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .section-title {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-title:hover {
      color: #667eea;
    }
    
    .toggle-icon {
      font-size: 0.8em;
      transition: transform 0.3s ease;
    }
    
    .toggle-icon.collapsed {
      transform: rotate(-90deg);
    }
    
    .section-content {
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .section-content.collapsed {
      max-height: 0;
    }
    
    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .room-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      border-left: 4px solid #667eea;
    }
    
    .room-card.vacant {
      border-left-color: #dc3545;
      opacity: 0.7;
    }
    
    .room-number {
      font-size: 1.5em;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }
    
    .room-tenant {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 10px;
    }
    
    .room-rate {
      font-size: 1.1em;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    
    .filter-controls {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-controls label {
      font-weight: bold;
      color: #333;
    }
    
    .filter-controls select {
      padding: 8px 12px;
      border: 2px solid #667eea;
      border-radius: 5px;
      font-size: 0.9em;
      background: white;
      cursor: pointer;
    }
    
    .filter-controls select:focus {
      outline: none;
      border-color: #764ba2;
    }
    
    .reset-btn {
      padding: 8px 16px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    .reset-btn:hover {
      background: #c82333;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    
    th {
      background: #f8f9fa;
      font-weight: bold;
      color: #333;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .amount {
      font-weight: bold;
      color: #28a745;
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8em;
      }
      
      .stats {
        grid-template-columns: 1fr;
      }
      
      .room-grid {
        grid-template-columns: 1fr;
      }
      
      table {
        font-size: 0.85em;
      }
      
      th, td {
        padding: 8px;
      }
    }
  </style>
</head>

          </thead>
          <tbody id="payments-tbody">
            <!-- Will be populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    let currentKos = 'um';
    let currentData = dataUM;
    let allPayments = dataUM.payments;
    
    // Initialize
    function init() {
      renderStats();
      renderRooms();
      renderMonthlyTable();
      renderPayments();
      populateFilters();
    }
    
    // Switch between UM and UB
    function switchKos(kos) {
      currentKos = kos;
      currentData = kos === 'um' ? dataUM : dataUB;
      allPayments = currentData.payments;
      
      // Update page title
      document.getElementById('page-title').textContent = 
        kos === 'um' ? '💰 Data Kos UM' : '💰 Data Kos UB';
      
      // Update toggle buttons
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Re-render everything
      renderStats();
      renderRooms();
      renderMonthlyTable();
      renderPayments();
      populateFilters();
      resetFilters();
    }
    
    // Render stats cards
    function renderStats() {
      const stats = currentData.summary;
      const html = `
        <div class="stat-card">
          <div class="stat-label">Total Kamar</div>
          <div class="stat-value">${stats.total_rooms}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Kamar Terisi</div>
          <div class="stat-value">${stats.occupied_rooms}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Pendapatan</div>
          <div class="stat-value">${formatRupiah(stats.total_income)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Transaksi</div>
          <div class="stat-value">${currentData.payments.length}</div>
        </div>
      `;
      document.getElementById('stats-container').innerHTML = html;
    }
    
    // Render rooms
    function renderRooms() {
      const html = currentData.rooms.map(room => `
        <div class="room-card ${room.current_tenant ? '' : 'vacant'}">
          <div class="room-number">Kamar ${room.room_number}</div>
          <div class="room-tenant">${room.current_tenant || 'Kosong'}</div>
          <div class="room-rate">${formatRupiah(room.current_rate)}/bulan</div>
          <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
            Total: ${formatRupiah(room.total_income)}
          </div>
        </div>
      `).join('');
      document.getElementById('rooms-grid').innerHTML = html;
    }
    
    // Render monthly payment table
    function renderMonthlyTable() {
      // Group payments by room and month
      const monthlyData = {};
      const months = [...new Set(currentData.payments.map(p => p.period))].sort();
      
      currentData.rooms.forEach(room => {
        monthlyData[room.room_number] = {
          tenant: room.current_tenant || 'Kosong',
          months: {}
        };
        months.forEach(month => {
          monthlyData[room.room_number].months[month] = 0;
        });
      });
      
      // Fill in payment data
      currentData.payments.forEach(p => {
        if (monthlyData[p.room_number]) {
          monthlyData[p.room_number].months[p.period] += p.amount;
        }
      });
      
      // Generate table HTML
      let html = '<div style="overflow-x: auto;"><table><thead><tr>';
      html += '<th style="position: sticky; left: 0; background: #f8f9fa; z-index: 10;">Kamar</th>';
      html += '<th style="position: sticky; left: 80px; background: #f8f9fa; z-index: 10;">Penghuni</th>';
      months.forEach(month => {
        html += `<th>${month}</th>`;
      });
      html += '<th style="background: #e8f5e9;">Total</th>';
      html += '</tr></thead><tbody>';
      
      Object.keys(monthlyData).sort((a, b) => parseInt(a) - parseInt(b)).forEach(roomNum => {
        const room = monthlyData[roomNum];
        const total = Object.values(room.months).reduce((sum, val) => sum + val, 0);
        
        html += '<tr>';
        html += `<td style="position: sticky; left: 0; background: white; font-weight: bold;">${roomNum}</td>`;
        html += `<td style="position: sticky; left: 80px; background: white; font-size: 0.85em;">${room.tenant}</td>`;
        months.forEach(month => {
          const amount = room.months[month];
          if (amount > 0) {
            html += `<td class="amount">${formatRupiah(amount)}</td>`;
          } else {
            html += '<td style="color: #ccc;">-</td>';
          }
        });
        html += `<td style="background: #e8f5e9; font-weight: bold;">${formatRupiah(total)}</td>`;
        html += '</tr>';
      });
      
      // Add total row
      html += '<tr style="background: #f0f0f0; font-weight: bold;">';
      html += '<td colspan="2" style="position: sticky; left: 0; background: #f0f0f0;">Total</td>';
      months.forEach(month => {
        const monthTotal = Object.values(monthlyData).reduce((sum, room) => sum + room.months[month], 0);
        html += `<td class="amount">${formatRupiah(monthTotal)}</td>`;
      });
      const grandTotal = Object.values(monthlyData).reduce((sum, room) => 
        sum + Object.values(room.months).reduce((s, v) => s + v, 0), 0);
      html += `<td style="background: #c8e6c9;">${formatRupiah(grandTotal)}</td>`;
      html += '</tr>';
      
      html += '</tbody></table></div>';
      document.getElementById('monthly-table-container').innerHTML = html;
    }
    
    // Render payments
    function renderPayments() {
      const html = allPayments.map(p => `
        <tr>
          <td>${p.date}</td>
          <td>Kamar ${p.room_number}</td>
          <td>${p.tenant_name}</td>
          <td class="amount">${formatRupiah(p.amount)}</td>
          <td>${p.payment_method}</td>
          <td>${p.period}</td>
        </tr>
      `).join('');
      document.getElementById('payments-tbody').innerHTML = html;
    }
    
    // Populate filter dropdowns
    function populateFilters() {
      // Room filter
      const roomOptions = currentData.rooms.map(r => 
        `<option value="${r.room_number}">Kamar ${r.room_number}</option>`
      ).join('');
      document.getElementById('room-filter').innerHTML = 
        '<option value="">Semua Kamar</option>' + roomOptions;
      
      // Month filter
      const months = [...new Set(currentData.payments.map(p => p.period))];
      const monthOptions = months.map(m => 
        `<option value="${m}">${m}</option>`
      ).join('');
      document.getElementById('month-filter').innerHTML = 
        '<option value="">Semua Bulan</option>' + monthOptions;
    }
    
    // Filter payments
    function filterPayments() {
      const roomFilter = document.getElementById('room-filter').value;
      const monthFilter = document.getElementById('month-filter').value;
      
      allPayments = currentData.payments.filter(p => {
        const matchRoom = !roomFilter || p.room_number == roomFilter;
        const matchMonth = !monthFilter || p.period === monthFilter;
        return matchRoom && matchMonth;
      });
      
      renderPayments();
    }
    
    // Reset filters
    function resetFilters() {
      document.getElementById('room-filter').value = '';
      document.getElementById('month-filter').value = '';
      allPayments = currentData.payments;
      renderPayments();
    }
    
    // Toggle section
    function toggleSection(section) {
      const content = document.getElementById(section + '-content');
      const icon = event.currentTarget.querySelector('.toggle-icon');
      content.classList.toggle('collapsed');
      icon.classList.toggle('collapsed');
    }
    
    // Format currency
    function formatRupiah(amount) {
      return 'Rp ' + amount.toLocaleString('id-ID');
    }
    
    // Initialize on load
    init();
  </script>
